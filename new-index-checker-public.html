<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Index Checker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Courier New', monospace;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 24px;
  }
  h1 { font-size: 18px; color: #fff; margin-bottom: 4px; letter-spacing: 1px; }
  .subtitle { color: #555; font-size: 12px; margin-bottom: 24px; }
  .setup {
    background: #111;
    border: 1px solid #222;
    padding: 20px;
    margin-bottom: 24px;
  }
  .setup h2 { font-size: 12px; color: #555; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; color: #555; margin-bottom: 6px; letter-spacing: 0.5px; }
  .field input, .field textarea {
    width: 100%;
    background: #0a0a0a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 8px 12px;
    font-family: inherit;
    font-size: 12px;
  }
  .field textarea { height: 120px; resize: vertical; }
  .field input:focus, .field textarea:focus { outline: none; border-color: #4ade80; }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  button {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 8px 20px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  button:hover { background: #252525; border-color: #555; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { border-color: #4ade80; color: #4ade80; }
  button.primary:hover { background: #0d2b1a; }
  button.danger { border-color: #f87171; color: #f87171; }
  button.danger:hover { background: #2b0d0d; }
  .stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat { background: #111; border: 1px solid #222; padding: 10px 16px; min-width: 100px; }
  .stat-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 22px; font-weight: bold; margin-top: 2px; }
  .stat-value.green { color: #4ade80; }
  .stat-value.red { color: #f87171; }
  .stat-value.yellow { color: #facc15; }
  .stat-value.blue { color: #60a5fa; }
  .progress-bar { width: 100%; height: 3px; background: #1a1a1a; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: #4ade80; transition: width 0.3s; }
  .log { background: #080808; border: 1px solid #1a1a1a; height: 250px; overflow-y: auto; padding: 12px; font-size: 11px; margin-bottom: 20px; }
  .log-line { padding: 2px 0; border-bottom: 1px solid #0f0f0f; }
  .log-line.indexed { color: #4ade80; }
  .log-line.not-indexed { color: #f87171; }
  .log-line.error { color: #facc15; }
  .log-line.info { color: #60a5fa; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { background: #111; padding: 8px 12px; text-align: left; color: #555; font-weight: normal; letter-spacing: 1px; font-size: 10px; text-transform: uppercase; border-bottom: 1px solid #222; position: sticky; top: 0; }
  td { padding: 6px 12px; border-bottom: 1px solid #111; word-break: break-all; }
  tr:hover td { background: #111; }
  .badge { display: inline-block; padding: 2px 8px; font-size: 10px; letter-spacing: 0.5px; }
  .badge.indexed { background: #0d2b1a; color: #4ade80; border: 1px solid #166534; }
  .badge.not-indexed { background: #2b0d0d; color: #f87171; border: 1px solid #991b1b; }
  .badge.pending { background: #1a1a1a; color: #555; border: 1px solid #333; }
  .badge.error { background: #2b2200; color: #facc15; border: 1px solid #854d0e; }
  .table-wrap { max-height: 400px; overflow-y: auto; border: 1px solid #1a1a1a; margin-bottom: 20px; }
  .filter-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .tab { padding: 5px 14px; border: 1px solid #222; background: #0a0a0a; color: #555; cursor: pointer; font-family: inherit; font-size: 11px; }
  .tab.active { border-color: #4ade80; color: #4ade80; }
  .speed-control { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #555; }
  input[type=range] { width: 100px; accent-color: #4ade80; }
  .hidden { display: none; }
</style>
</head>
<body>

<h1>GOOGLE INDEX CHECKER</h1>
<div class="subtitle">Bulk site: check via ValueSerp API — paste your URLs & API key to start</div>

<div class="setup" id="setupPanel">
  <h2>⚙ Setup</h2>
  <div class="field">
    <label>VALUESERP API KEY — get free key at valueserp.com (100 searches/month free)</label>
    <input type="password" id="apiKey" placeholder="Your ValueSerp API key...">
  </div>
  <div class="field">
    <label>URLs — one per line</label>
    <textarea id="urlInput" placeholder="https://example.com/page-1&#10;https://example.com/page-2&#10;https://example.com/page-3"></textarea>
  </div>
  <button class="primary" onclick="initChecker()">▶ LOAD & START</button>
</div>

<div id="checkerPanel" class="hidden">
  <div class="controls">
    <button class="primary" id="btnStart" onclick="startCheck()">▶ START</button>
    <button class="danger" id="btnStop" onclick="stopCheck()" disabled>■ STOP</button>
    <button id="btnExport" onclick="exportCSV()">↓ EXPORT ALL CSV</button>
    <button id="btnExportNI" onclick="exportNotIndexed()">↓ NOT INDEXED ONLY</button>
    <div class="speed-control">
      <span>DELAY:</span>
      <input type="range" id="delay" min="500" max="3000" value="1200" step="100">
      <span id="delayVal">1.2s</span>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-value blue" id="sTotal">0</div></div>
    <div class="stat"><div class="stat-label">Checked</div><div class="stat-value" id="sChecked">0</div></div>
    <div class="stat"><div class="stat-label">Indexed</div><div class="stat-value green" id="sIndexed">0</div></div>
    <div class="stat"><div class="stat-label">Not Indexed</div><div class="stat-value red" id="sNotIndexed">0</div></div>
    <div class="stat"><div class="stat-label">Errors</div><div class="stat-value yellow" id="sErrors">0</div></div>
    <div class="stat"><div class="stat-label">Remaining</div><div class="stat-value" id="sRemaining">0</div></div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="log" id="log"></div>

  <div class="filter-tabs">
    <button class="tab active" onclick="filterTable('all', this)">ALL</button>
    <button class="tab" onclick="filterTable('indexed', this)">INDEXED</button>
    <button class="tab" onclick="filterTable('not-indexed', this)">NOT INDEXED</button>
    <button class="tab" onclick="filterTable('error', this)">ERRORS</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>#</th><th>URL</th><th>STATUS</th><th>RESULT TITLE</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
let URLS = [];
let API_KEY = '';
let results = [];
let running = false;
let currentIndex = 0;
let counts = { indexed: 0, notIndexed: 0, errors: 0 };
let currentFilter = 'all';

document.getElementById('delay').addEventListener('input', function() {
  document.getElementById('delayVal').textContent = (this.value / 1000).toFixed(1) + 's';
});

function initChecker() {
  API_KEY = document.getElementById('apiKey').value.trim();
  const raw = document.getElementById('urlInput').value.trim();
  if (!API_KEY) { alert('Please enter your ValueSerp API key.'); return; }
  if (!raw) { alert('Please paste your URLs.'); return; }

  URLS = raw.split('\n').map(u => u.trim()).filter(u => u.startsWith('http'));
  if (URLS.length === 0) { alert('No valid URLs found.'); return; }

  results = URLS.map(url => ({ url, status: 'pending', title: '' }));
  counts = { indexed: 0, notIndexed: 0, errors: 0 };
  currentIndex = 0;

  document.getElementById('sTotal').textContent = URLS.length;
  document.getElementById('sRemaining').textContent = URLS.length;
  document.getElementById('setupPanel').classList.add('hidden');
  document.getElementById('checkerPanel').classList.remove('hidden');

  URLS.forEach((url, i) => renderRow(i));
  log('Loaded ' + URLS.length + ' URLs. Press START to begin.', 'info');
}

function log(msg, type = 'info') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  line.textContent = new Date().toTimeString().slice(0,8) + ' › ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function updateStats() {
  document.getElementById('sChecked').textContent = currentIndex;
  document.getElementById('sIndexed').textContent = counts.indexed;
  document.getElementById('sNotIndexed').textContent = counts.notIndexed;
  document.getElementById('sErrors').textContent = counts.errors;
  document.getElementById('sRemaining').textContent = URLS.length - currentIndex;
  document.getElementById('progressFill').style.width = (currentIndex / URLS.length * 100) + '%';
}

function renderRow(i) {
  const r = results[i];
  const tbody = document.getElementById('tableBody');
  let row = document.getElementById('row-' + i);
  if (!row) {
    row = document.createElement('tr');
    row.id = 'row-' + i;
    row.dataset.status = 'pending';
    row.innerHTML = `
      <td>${i + 1}</td>
      <td><a href="${r.url}" target="_blank" style="color:#60a5fa;text-decoration:none">${r.url}</a></td>
      <td id="badge-${i}"><span class="badge pending">PENDING</span></td>
      <td id="title-${i}" style="color:#555">—</td>
    `;
    tbody.appendChild(row);
  } else {
    row.dataset.status = r.status;
    const badgeClass = r.status === 'indexed' ? 'indexed' : r.status === 'not-indexed' ? 'not-indexed' : r.status === 'error' ? 'error' : 'pending';
    const badgeText = r.status === 'indexed' ? 'INDEXED' : r.status === 'not-indexed' ? 'NOT INDEXED' : r.status === 'error' ? 'ERROR' : 'PENDING';
    document.getElementById('badge-' + i).innerHTML = `<span class="badge ${badgeClass}">${badgeText}</span>`;
    document.getElementById('title-' + i).textContent = r.title || '—';
    document.getElementById('title-' + i).style.color = r.status === 'indexed' ? '#4ade80' : r.status === 'not-indexed' ? '#f87171' : '#facc15';
    applyFilter();
  }
}

function applyFilter() {
  document.querySelectorAll('#tableBody tr').forEach(row => {
    row.style.display = (currentFilter === 'all' || row.dataset.status === currentFilter) ? '' : 'none';
  });
}

function filterTable(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

async function checkURL(url, index) {
  const query = encodeURIComponent('site:' + url);
  const apiUrl = `https://api.valueserp.com/search?api_key=${API_KEY}&q=${query}&num=1&gl=us&hl=en`;
  try {
    const resp = await fetch(apiUrl);
    const data = await resp.json();
    if (data.error) {
      results[index].status = 'error';
      results[index].title = data.error;
      counts.errors++;
      log('ERROR ' + url + ' → ' + data.error, 'error');
    } else {
      const organic = data.organic_results || [];
      const domain = new URL(url).hostname;
      const hasResult = organic.length > 0 && organic[0].link && organic[0].link.includes(domain);
      if (hasResult) {
        results[index].status = 'indexed';
        results[index].title = organic[0].title || '';
        counts.indexed++;
        log('✓ INDEXED: ' + url, 'indexed');
      } else {
        results[index].status = 'not-indexed';
        counts.notIndexed++;
        log('✗ NOT INDEXED: ' + url, 'not-indexed');
      }
    }
  } catch (e) {
    results[index].status = 'error';
    results[index].title = e.message;
    counts.errors++;
    log('FETCH ERROR: ' + url + ' → ' + e.message, 'error');
  }
  renderRow(index);
  updateStats();
}

async function startCheck() {
  if (running) return;
  running = true;
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').disabled = false;
  log('Starting from URL #' + (currentIndex + 1) + '...', 'info');
  while (currentIndex < URLS.length && running) {
    await checkURL(URLS[currentIndex], currentIndex);
    currentIndex++;
    if (currentIndex < URLS.length && running) {
      await new Promise(r => setTimeout(r, parseInt(document.getElementById('delay').value)));
    }
  }
  if (currentIndex >= URLS.length) {
    log('✓ COMPLETE — Indexed: ' + counts.indexed + ' | Not indexed: ' + counts.notIndexed + ' | Errors: ' + counts.errors, 'info');
  }
  running = false;
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled = true;
}

function stopCheck() {
  running = false;
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled = true;
  log('Stopped at URL #' + currentIndex + '. Press START to resume.', 'info');
}

function exportCSV() {
  const rows = [['#','URL','STATUS','TITLE']];
  results.forEach((r, i) => rows.push([i+1, r.url, r.status, r.title]));
  downloadCSV(rows, 'index_check_all.csv');
}

function exportNotIndexed() {
  const rows = [['#','URL']];
  results.filter(r => r.status === 'not-indexed').forEach((r, i) => rows.push([i+1, r.url]));
  downloadCSV(rows, 'not_indexed.csv');
}

function downloadCSV(rows, filename) {
  const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = filename;
  a.click();
}
</script>
</body>
</html>
